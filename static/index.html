<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Finger-to-Mouth Monkey Meme</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="camera-panel" aria-label="Webcam feed">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div class="score">Confidence <span id="confidence">0.00</span></div>
        <div id="cameraStatus" class="status">Requesting camera...</div>
      </section>

      <section class="meme-panel" aria-label="Monkey meme display">
        <img id="monkeyImage" src="/assets/thinking_monkey.jpeg" alt="Monkey thinking meme">
        <div id="placeholder" class="placeholder">
          <strong>Monkey meme placeholder</strong>
          <span>Add assets/thinking_monkey.jpeg</span>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
